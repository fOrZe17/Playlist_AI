{% extends "base.html" %}

{% block title %}Регистрация — Playlist AI{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card card">
        <h2>Регистрация</h2>
        <p class="form-subtitle">Создайте аккаунт для начала работы</p>
        <div class="form-error" id="form-error"></div>
        <form id="register-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <div class="password-field">
                    <input type="password" id="password" name="password" placeholder="Минимум 4 символа" required>
                    <button type="button" class="password-toggle" data-password-toggle aria-label="Показать пароль, пока кнопка удерживается">&#128065;</button>
                </div>
            </div>
            <div class="form-group">
                <label for="password_confirm">Подтверждение пароля</label>
                <div class="password-field">
                    <input type="password" id="password_confirm" name="password_confirm" placeholder="Повторите пароль" required>
                    <button type="button" class="password-toggle" data-password-toggle aria-label="Показать пароль, пока кнопка удерживается">&#128065;</button>
                </div>
            </div>
            <button type="submit" class="btn btn-full" id="submit-btn">Зарегистрироваться</button>
        </form>
        <p class="form-footer">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </div>
</section>
{% endblock %}

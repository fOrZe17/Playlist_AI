{% extends "base.html" %}

{% block title %}Вход — Playlist AI{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card card">
        <h2>Вход в аккаунт</h2>
        <p class="form-subtitle">Войдите, чтобы генерировать и сохранять плейлисты</p>
        <div class="form-error" id="form-error"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn btn-full" id="submit-btn">Войти</button>
        </form>
        <p class="form-footer">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
    </div>
</section>
{% endblock %}
